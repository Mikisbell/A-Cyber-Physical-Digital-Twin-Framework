# SSOT — Single Source of Truth: Parámetros Físicos del Gemelo Digital
# Archivo: config/params.yaml
#
# REGLA BÉLICA: Este archivo es el ÚNICO lugar donde se definen los parámetros físicos.
# Nunca edites directamente header.h ni params.py.
# Ejecuta: python tools/generate_params.py para regenerar los archivos derivados.

metadata:
  project: "belico-stack"
  version: "2.0.0"
  last_updated: "2026-03-06"
  author: ""
  config_hash: ""  # Generado automáticamente por tools/generate_params.py

# ─────────────────────────────────────────────────
# DOMINIO DEL PROYECTO
# ─── Define qué solver backend usa torture_chamber ─
# Valores: "structural" (OpenSeesPy), "water" (FEniCSx), "air" (FEniCSx/SU2)
# ─────────────────────────────────────────────────
project:
  domain: "structural"

# ─────────────────────────────────────────────────
# ─────────────────────────────────────────────────
# PROPIEDADES DEL MATERIAL
# ─────────────────────────────────────────────────
material:
  name: "Concreto Liviano Reciclado C&DW"
  elastic_modulus_E:
    value: 20e9        # Pa (20 GPa) estimado para concreto liviano 20MPa
    units: "Pa"
    symbol: "E"
  yield_strength_fy:
    value: 20e6        # Pa (20 MPa) fc' resistencia a compresión nominal
    units: "Pa"
    symbol: "fc"
  poisson_ratio:
    value: 0.2
    units: "dimensionless"
    symbol: "nu"
  density:
    value: 1800.0      # kg/m3 (Exigencia del paper)
    units: "kg/m^3"
    symbol: "rho"
  thermal_conductivity:
    value: 0.51        # W/m·K (Propiedad de degradación a predecir por LSTM)
    units: "W/m·K"
    symbol: "k_term"

# ─────────────────────────────────────────────────
# MODELO NO-LINEAL (Concrete02 + Steel02 + Fiber Section)
# ─── OBLIGATORIO al crear un proyecto nuevo ──────
# Valores null = no configurado. torture_chamber.py usa modelo lineal como fallback.
# Al iniciar un proyecto, el usuario DEBE proveer estos datos de laboratorio o literatura.
# ─────────────────────────────────────────────────
nonlinear:
  # Concreto C&DW — modelo Concrete02 (Kent-Scott-Park modificado)
  concrete:
    epsc0:
      value: null        # Deformación al pico de compresión (typ. 0.002)
      units: "-"
      desc: "Strain at peak compressive stress fc'"
      required: true
    fpcu_ratio:
      value: null        # Resistencia residual post-pico como fracción de fc (typ. 0.2)
      units: "-"
      desc: "Residual/peak stress ratio (fpcu = fpcu_ratio * fc)"
      required: true
    epsU:
      value: null        # Deformación última de aplastamiento (typ. 0.005-0.008 para C&DW)
      units: "-"
      desc: "Ultimate crushing strain"
      required: true
    ft_ratio:
      value: null        # Resistencia a tracción como fracción de fc (typ. 0.08-0.12)
      units: "-"
      desc: "Tensile/compressive strength ratio (ft = ft_ratio * fc)"
      required: true
    Ets:
      value: null        # Pendiente de tension stiffening (typ. fc/0.002)
      units: "Pa"
      desc: "Tension stiffening slope"
      required: true
    confinement_ratio:
      value: null        # Factor de confinamiento fcc/fc (typ. 1.2-1.5 según estribos)
      units: "-"
      desc: "Confined/unconfined strength ratio (Mander model)"
      required: true

  # Acero de refuerzo — modelo Steel02 (Giuffré-Menegotto-Pinto)
  steel:
    fy:
      value: null        # Fluencia del acero (typ. 420e6 Pa para Grado 60)
      units: "Pa"
      desc: "Steel yield strength"
      required: true
    Es:
      value: null        # Módulo elástico del acero (typ. 200e9 Pa)
      units: "Pa"
      desc: "Steel elastic modulus"
      required: true
    b_hardening:
      value: null        # Ratio de endurecimiento por deformación (typ. 0.01)
      units: "-"
      desc: "Strain hardening ratio (post-yield slope / Es)"
      required: true
    R0:
      value: 18.0        # Parámetro de transición curva (default Menegotto-Pinto)
      units: "-"
      desc: "Steel02 transition parameter R0"
      required: false
    cR1:
      value: 0.925       # Default Menegotto-Pinto
      units: "-"
      desc: "Steel02 coefficient cR1"
      required: false
    cR2:
      value: 0.15        # Default Menegotto-Pinto
      units: "-"
      desc: "Steel02 coefficient cR2"
      required: false

  # Sección de fibras — geometría del refuerzo
  section:
    cover:
      value: null        # Recubrimiento de concreto (typ. 0.04 m)
      units: "m"
      desc: "Concrete cover thickness"
      required: true
    n_bars_face:
      value: null        # Barras por cara (typ. 2-4)
      units: "-"
      desc: "Number of rebar per face"
      required: true
    bar_diameter:
      value: null        # Diámetro de barra (typ. 0.016 m = 16mm)
      units: "m"
      desc: "Rebar diameter"
      required: true
    stirrup_diameter:
      value: null        # Diámetro del estribo (typ. 0.008-0.010 m)
      units: "m"
      desc: "Stirrup/tie diameter"
      required: true
    stirrup_spacing:
      value: null        # Separación de estribos (typ. 0.10-0.20 m)
      units: "m"
      desc: "Stirrup spacing"
      required: true
    n_integration_pts:
      value: 5           # Puntos de integración por elemento (default OK)
      units: "-"
      desc: "Gauss-Lobatto integration points per element"
      required: false

  # Geometría de columna
  geometry:
    L:
      value: null        # Longitud de columna (m)
      units: "m"
      desc: "Column length"
      required: true
    b:
      value: null        # Ancho de sección cuadrada (m)
      units: "m"
      desc: "Section width (square section assumed)"
      required: true
    n_elements:
      value: 4           # Elementos por columna (default OK para forceBeamColumn)
      units: "-"
      desc: "Number of elements along column height"
      required: false

  # Análisis dinámica
  analysis:
    integrator:
      value: "Newmark"
      desc: "Time integration method"
      required: false
    beta:
      value: 0.25        # Newmark average acceleration
      units: "-"
      required: false
    gamma:
      value: 0.5
      units: "-"
      required: false

# ─────────────────────────────────────────────────
# PARÁMETROS ESTRUCTURALES
# ─────────────────────────────────────────────────
structure:
  # Rigidez lateral de la estructura (OpenSeesPy: uniaxialMaterial)
  stiffness_k:
    value: 5000.0      # N/m
    units: "N/m"
    symbol: "k"
    firmware_var: "STIFFNESS_K"   # nombre de la constante en header.h
    simulation_var: "k"           # nombre de la variable en params.py

  # Masa total de la estructura (OpenSeesPy: node mass)
  mass_m:
    value: 1000.0      # kg
    units: "kg"
    symbol: "m"
    firmware_var: "MASS_M"
    simulation_var: "mass"

  # Frecuencia natural (calculada, no editar directamente)
  natural_frequency_fn:
    value: null        # Hz — calculada como sqrt(k/m) / (2*pi)
    units: "Hz"
    symbol: "fn"
    computed: true

# ─────────────────────────────────────────────────
# AMORTIGUAMIENTO (Rayleigh Damping en OpenSeesPy)
# ─────────────────────────────────────────────────
damping:
  method: "rayleigh"
  ratio_xi:
    value: 0.05        # 5% amortiguamiento crítico (típico para estructuras de acero)
    units: "dimensionless"
    symbol: "xi"
    firmware_var: "DAMPING_RATIO"
    simulation_var: "xi"
  alpha_mass:
    value: null        # calculado: 2*xi*omega_1 (primer modo)
    computed: true
  beta_stiff:
    value: null        # calculado: 2*xi/omega_1
    computed: true

# ─────────────────────────────────────────────────
# ADQUISICIÓN DE DATOS — Arduino / Sensores
# ─────────────────────────────────────────────────
acquisition:
  sample_rate_hz:
    value: 100         # Hz — frecuencia de muestreo del sensor
    units: "Hz"
    firmware_var: "SAMPLE_RATE_HZ"
    simulation_var: "dt"           # dt = 1/sample_rate_hz
  sensor_pin:
    value: "A0"
    firmware_var: "SENSOR_PIN"
  serial_baud:
    value: 115200
    firmware_var: "SERIAL_BAUD"

# ─────────────────────────────────────────────────
# INTEGRIDAD TEMPORAL — Sincronizador Bélico
# ─────────────────────────────────────────────────
temporal:
  dt_simulation:
    value: 0.01        # s — debe coincidir con 1/acquisition.sample_rate_hz
    units: "s"
    note: "Si no coincide con dt del sensor, el Verifier bloquea el pipeline."
  max_jitter_ms:
    value: 5           # ms — variación máxima de latencia serial aceptada
    units: "ms"
    note: "Si el promedio de jitter excede este valor, los resultados son nulos."
  buffer_depth:
    value: 10          # número de paquetes en espera para suavizado
    units: "packets"
    note: "Compromiso entre latencia y estabilidad. No bajar de 5."
  handshake_token:
    value: "BELICO_SYNC_2026"
    note: "Token que Arduino y bridge.py intercambian al inicio para verificar SSOT."
  clock_drift_warning_ms:
    value: 2           # ms — alerta temprana antes de llegar a max_jitter_ms
    units: "ms"
  prediction_mode:
    enabled: false     # true: activa simulación de peor escenario en paralelo
    trigger_threshold_g:
      value: 0.3       # g — aceleración que dispara el modo predicción
      units: "g"

# ─────────────────────────────────────────────────
# SHADOW PLAY — Filtro de Kalman (Procesamiento de Señal)
# ─────────────────────────────────────────────────
signal_processing:
  kalman:
    enabled: true
    process_noise_q:
      value: 1.0e-5    # Varianza del proceso (confianza en el modelo físico)
      description: "Si es muy bajo, el filtro ignora el sensor y sigue su propia inercia."
    measurement_noise_r:
      value: 0.01      # Varianza de la medición (ruido esperado del Arduino MPU6050)
      description: "Si es muy alto, el filtro suaviza en exceso ocultando picos reales."

# ─────────────────────────────────────────────────
# GUARDRAILS DE VALENTÍA — Límites del Verifier
# ─────────────────────────────────────────────────
guardrails:
  max_stress_ratio:
    value: 0.6         # σ_max ≤ 0.6·fy (Verifier Gate 3)
    description: "Fracción de fy que activa la alerta de fallo inminente"
  convergence_tolerance:
    value: 1.0e-6      # Residual de equilibrio máximo aceptado
    description: "Tolerancia numérica de OpenSeesPy (Verifier Gate 1)"
  max_slenderness:
    value: 120         # λ = L/r — Physical Critic Gate (pandeo)
    description: "Relación de esbeltez máxima para acero"
  eccentricity_ratio:
    value: 0.10        # e/b — Physical Critic Gate (torsión)
    description: "Excentricidad máxima relativa al ancho del edificio"
  mass_participation_min:
    value: 0.90        # 90% mínimo en los primeros 3 modos
    description: "Participación mínima de masa modal"
  max_sensor_outlier_sigma:
    value: 3.0         # Outliers > 3σ → datos inválidos
    description: "Límite estadístico para detección de ruido en sensores"

# ─────────────────────────────────────────────────
# DOMINIO AGUA (FEniCSx — Navier-Stokes)
# ─── Activar con project.domain: "water" ────────
# Valores null = no configurado. Llenar al crear proyecto de fluidos.
# ─────────────────────────────────────────────────
fluid:
  properties:
    viscosity_mu:
      value: null        # Pa.s (typ. 1e-3 para agua, 1.8e-5 para aire)
      units: "Pa.s"
      desc: "Dynamic viscosity"
      required: true
    density_rho:
      value: null        # kg/m3 (typ. 1000 para agua)
      units: "kg/m3"
      desc: "Fluid density"
      required: true
  geometry:
    length:
      value: null        # m — longitud del dominio de simulación
      units: "m"
      desc: "Domain length"
      required: true
    height:
      value: null        # m — altura del dominio
      units: "m"
      desc: "Domain height"
      required: true
    width:
      value: null        # m — ancho (0 para simulación 2D)
      units: "m"
      desc: "Domain width (0 for 2D)"
      required: true
  boundary:
    inlet_velocity:
      value: null        # m/s — velocidad de entrada
      units: "m/s"
      desc: "Inlet velocity"
      required: true
    outlet_pressure:
      value: null        # Pa — presión de salida (typ. 0 gauge)
      units: "Pa"
      desc: "Outlet pressure (gauge)"
      required: true
  mesh:
    resolution:
      value: null        # elementos por metro
      units: "elem/m"
      desc: "Mesh resolution"
      required: true
  analysis:
    time_step:
      value: null        # s — paso temporal
      units: "s"
      desc: "Time step for transient analysis"
      required: true
    total_time:
      value: null        # s — duración total
      units: "s"
      desc: "Total simulation time"
      required: true

# ─────────────────────────────────────────────────
# DOMINIO AIRE (FEniCSx/SU2 — Wind Loading)
# ─── Activar con project.domain: "air" ──────────
# Valores null = no configurado. Llenar al crear proyecto de viento.
# ─────────────────────────────────────────────────
air:
  properties:
    viscosity_mu:
      value: null        # Pa.s (typ. 1.8e-5 para aire a 20°C)
      units: "Pa.s"
      desc: "Air dynamic viscosity"
      required: true
    density_rho:
      value: null        # kg/m3 (typ. 1.225 a nivel del mar)
      units: "kg/m3"
      desc: "Air density"
      required: true
  geometry:
    length:
      value: null        # m — longitud del túnel de viento / dominio
      units: "m"
      desc: "Domain length"
      required: true
    height:
      value: null        # m — altura del dominio
      units: "m"
      desc: "Domain height"
      required: true
    width:
      value: null        # m — ancho (0 para 2D)
      units: "m"
      desc: "Domain width (0 for 2D)"
      required: true
    obstacle_width:
      value: null        # m — ancho del edificio/obstáculo
      units: "m"
      desc: "Obstacle/building width"
      required: true
    obstacle_height:
      value: null        # m — altura del edificio/obstáculo
      units: "m"
      desc: "Obstacle/building height"
      required: true
  boundary:
    inlet_velocity:
      value: null        # m/s — velocidad del viento
      units: "m/s"
      desc: "Wind speed at inlet"
      required: true
    turbulence_intensity:
      value: null        # adimensional (typ. 0.1-0.2)
      units: "-"
      desc: "Turbulence intensity at inlet"
      required: true
  mesh:
    resolution:
      value: null        # elementos por metro
      units: "elem/m"
      desc: "Mesh resolution"
      required: true
  analysis:
    time_step:
      value: null        # s
      units: "s"
      desc: "Time step"
      required: true
    total_time:
      value: null        # s
      units: "s"
      desc: "Total simulation time"
      required: true
