# PEER NGA-West2 Record Downloader
# ===================================
# Downloads seismic .AT2 records on-demand and commits them to the repo.
# Triggered manually via GitHub UI (Actions tab → Download Records → Run workflow).
#
# Setup:
#   Go to: Settings → Secrets and variables → Actions → New repository secret
#   Add: PEER_EMAIL and PEER_PASSWORD

name: Download Seismic Records (PEER NGA-West2)

on:
  workflow_dispatch:
    inputs:
      rsn_list:
        description: "RSN numbers to download (space-separated, e.g.: 766 1158 4517)"
        required: true
        default: "766"
      out_dir:
        description: "Output directory (relative to repo root)"
        required: false
        default: "db/excitation/records"

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install python-dotenv

      - name: Discover PEER authenticated URLs
        env:
          PEER_EMAIL: ${{ secrets.PEER_EMAIL }}
          PEER_PASSWORD: ${{ secrets.PEER_PASSWORD }}
        run: |
          python3 - <<'PYEOF'
          import os, re, sys, tempfile, subprocess, urllib.parse
          from pathlib import Path
          sys.path.insert(0, '.')
          from tools.peer_downloader import PeerSession, load_credentials, PEER_BASE, _curl

          email, pw = load_credentials()
          s = PeerSession(email, pw, verbose=True)
          if not s.login():
              print("Login failed — skipping URL discovery"); sys.exit(0)

          print("\n=== Authenticated URL Discovery ===")

          # Dump homepage after login to find authenticated nav links
          code, html = s._get(PEER_BASE + "/")
          print(f"Homepage: HTTP {code}, {len(html)} chars")

          # Find all navigation links
          nav_links = re.findall(r'href=["\']([^"\']+)["\']', html)
          print("All nav links:")
          for lnk in set(nav_links):
              if any(k in lnk.lower() for k in ['search','download','record','ngaw','motion','sign_out','member']):
                  print(f"  {lnk}")

          # Save for artifact
          Path('/tmp/peer_home_auth.html').write_text(html)

          # Try common PEER download URLs
          test_urls = [
              "/gm_search",
              "/gm_search/download",
              "/ngawest2",
              "/ground_motion",
              "/datasets",
              "/records",
          ]
          for ep in test_urls:
              code2, body2 = s._get(PEER_BASE + ep)
              print(f"  {ep}: HTTP {code2}, {len(body2)} chars")
          PYEOF

      - name: Upload auth HTML (diagnosis)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: peer-auth-html
          path: /tmp/peer_home_auth.html
          if-no-files-found: ignore

      - name: Download records from PEER NGA-West2
        env:
          PEER_EMAIL: ${{ secrets.PEER_EMAIL }}
          PEER_PASSWORD: ${{ secrets.PEER_PASSWORD }}
        run: |
          mkdir -p ${{ inputs.out_dir }}
          python3 tools/peer_downloader.py \
            --rsn ${{ inputs.rsn_list }} \
            --out ${{ inputs.out_dir }}

      - name: Commit downloaded records
        run: |
          git config user.name "Records Bot"
          git config user.email "records-bot@users.noreply.github.com"
          git add ${{ inputs.out_dir }}/*.AT2 2>/dev/null || true
          if git status --porcelain | grep -q .; then
            RSN_LIST="${{ inputs.rsn_list }}"
            git commit -m "data: add seismic records RSN ${RSN_LIST// /, RSN }"
            git push origin main
            echo "Records committed and pushed."
          else
            echo "No new records to commit (may already exist)."
          fi
