# belico.yaml - Master Orchestrator (Architecture Declaration)
# Version 3.0 (March 2026)

project_metadata:
  name: "Belico Stack EIU"
  author: ""
  status: "factory_ready"

# Memory (Engram)
memory:
  path: "~/.engram"
  auto_commit: true
  hashing_algorithm: "sha256"

# Sub-agents
agents:
  verifier: ".agent/prompts/verifier.md"
  physical_critic: ".agent/prompts/physical_critic.md"
  bibliography_agent: ".agent/prompts/bibliography_agent.md"
  figure_agent: ".agent/prompts/figure_agent.md"
  reviewer_simulator: ".agent/prompts/reviewer_simulator.md"

# External repos (cloned into .agents/)
external:
  engram: ".agents/engram"
  agent_teams_lite: ".agents/agent-teams-lite"
  gentleman_skills: ".agents/Gentleman-Skills"

# Skills
skills:
  signal_processing: ".agent/skills/signal_processing.md"
  paper_production: ".agent/skills/paper_production.md"
  literature_review: ".agent/skills/literature_review.md"
  cfd_domain: ".agent/skills/cfd_domain.md"
  wind_domain: ".agent/skills/wind_domain.md"
  norms_codes: ".agent/skills/norms_codes.md"

# Workspace
workspace:
  src: "src/"
  drafts: "articles/drafts/"
  tools: "tools/"
  config: "config/"
